# PPO — GPU-batched defaults (gpu_sim=true).
#
# Activated when the benchmark's gpu_sim=true. Same key schema is consumed by
# all three algorithm sources:
#   - custom_torch (PQL/DDiffPG-style PyTorch tree)
#   - custom_jax   (Flax/optax tree; reads the same keys + ignores act_class/cri_class)
#   - stable_baseline3 (SB3 PPO; reads policy / policy_kwargs / learning_rate / n_steps / ...)
#
# >>> FILL IN: maintainer-tuned values for the maniskill benchmark.

name: ppo
algo: ppo
task: null

# ---- Sim / device ----
num_envs: 4096            # matched to IsaacLab ppo.parallel.yaml
n_envs: ${.num_envs}      # alias used by SB3 path
device: cuda
sim_device: ${.device}
rl_device: ${.device}
graphics_device_id: 0
seed: 42                  # pin per ManiSkill train.py convention; override via `seed=N` for sweeps
gpu_sim: true
total_timesteps: 100_000_000     # = 10e7, mirrors reference total_timesteps
max_step: ${.total_timesteps}   # custom_torch alias
checkpoint_interval: 10_000_000  # periodic save to checkpoint_<NN>M.pth; 0 disables
wandb: null
wandb_run_name: null             # tooling-side override (rl-sweep, rl-tuning-agent set per-run); declared so Hydra struct-mode accepts plain overrides
record_video: true               # disable on headless cluster nodes via `record_video=false`

# ---- Env construction (custom_jax: passed to RLFactory.make as **env_params) ----
# Mirror the loco-mujoco reference at examples/training_examples/jax_rl/conf.yaml.
# Fill in benchmark-specific overrides; defaults below let the env pick its own
# reward / terminal / goal handlers.
env_params: {}                   # e.g. {horizon: 1000, reward_type: LocomotionReward, reward_params: {tracking_w_exp_xy: 4.0}}

# Controller selection (read by env_wrapper._make_maniskill_gpu_env). null
# lets ManiSkill fall back to its task default. StackCube-Tower-v1 needs
# `pd_ee_ema_delta_pos` — the custom EMA-cumulative-delta EE-position
# controller registered on the FR3FrankaHand agent (matches IsaacLab's
# `EMACumulativeDeltaPositionAction` exactly: scale=0.01, alpha=0.5, RPY
# locked at the post-reset value, action range [-1, 1]^3 plus 1 gripper).
control_mode: pd_ee_ema_delta_pos

# ---- Eval / render CLI knobs (used by eval.py / render.py; ignored by train.py) ----
checkpoint: null
n_episodes: 100                  # eval runs to 100 completions per env; aggregate across envs
eval_total_steps: 4000           # per-env step budget for eval (ensures we sample steady-state, not first-completion bias)
render_max_steps: 1000

# ---- PPO hyperparameters (unified key names) — matched to IsaacLab ppo.parallel.yaml ----
n_steps: 16               # rollout horizon per iteration (custom_torch reads as horizon_len)
horizon_len: ${.n_steps}
batch_size: 8192
n_epochs: 8
n_minibatches: 64         # 8x more grad steps per outer iter than the old default of 4
update_times: ${.n_epochs}
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.15
clip_range_vf: null
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5        # reference uses 0.5, was 1.0 here
learning_rate: 5.0e-4     # reference uses 1e-4, was 3e-4 here
anneal_lr: false          # reference's _get_optimizer respects this flag (linear decay over num_updates)
weight_decay: 0.0         # reference passes this to optax.adamw
value_clip: true

# ---- Policy network (custom_jax reads hidden_dims + init_log_std + learnable_std) ----
hidden_dims: [512, 256, 128]   # matched to IsaacLab ppo.parallel.yaml
activation: tanh
init_log_std: -0.223      # = log(0.8); reference uses init_std=0.8, our log_std default was 0.0 (=> std=1.0)
learnable_std: true       # if false, log_std is wrapped in stop_gradient (fixed std)

# ---- ActorCriticBase shared ----
actor_lr: ${.learning_rate}
critic_lr: ${.learning_rate}
obs_norm: true
value_norm: true
handle_timeout: true
tracker_len: 1000
reward_scale: 1.0
no_tgt_actor: true
use_gae: true

act_class: DiagGaussianMLPPolicy
cri_class: MLPCritic

# ---- Policy network (SB3 path uses these; custom_torch uses act_class/cri_class) ----
policy: MlpPolicy
policy_kwargs:
  net_arch: [256, 256]

# ---- Tuning search-space ----
search_space:
  learning_rate:   { type: log_uniform, low: 1.0e-5, high: 1.0e-3 }
  n_steps:         { type: choice, values: [8, 16, 32, 64] }
  batch_size:      { type: choice, values: [8192, 16384, 32768, 65536] }
  gamma:           { type: uniform, low: 0.95, high: 0.999 }
  gae_lambda:      { type: uniform, low: 0.9, high: 0.99 }
  clip_range:      { type: choice, values: [0.1, 0.2, 0.3] }
  ent_coef:        { type: log_uniform, low: 1.0e-6, high: 1.0e-2 }
  n_epochs:        { type: choice, values: [2, 4, 8] }
